<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dice</title>
</head>

<p id="target"></p>
<body>

<script>
    let rolls,sum;

    rolls = parseInt(prompt("How many rolls would you like?"))
    sum = 0

    for (let i = 0; i < rolls; i++){
        let dice = Math.floor(Math.random() * 6) + 1
        sum += dice
    }

    document.querySelector('#target').innerHTML = "Sum of dice rolls: " + sum;
</script>

</body>
</html>
