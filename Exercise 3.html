<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integers</title>
</head>
<body>
<p id="target"></p>
<p id="target2"></p>
<p id="target3"></p>

<script>

  'use strict';

  let a,b,c,sum,product,average

  a = parseInt(prompt("Enter number 1"));
  b = parseInt(prompt("Enter number 2"));
  c = parseInt(prompt("Enter number 3"));

  sum = a+b+c;
  product = a*b*c;
  average = (a+b+c)/3

  document.querySelector('#target').innerHTML = "The sum is "+sum;
  document.querySelector('#target2').innerHTML = "The product is "+product;
  document.querySelector('#target3').innerHTML = "The average is "+average;





</script>



</body>
</html>
