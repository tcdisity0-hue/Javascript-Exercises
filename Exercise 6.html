<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Square root</title>
</head>
<body>
<p id="target"></p>
<script>
    let calculate,number,result;

    calculate = confirm("Should I calculate the square root?");

    if (calculate){
        number = prompt("Enter a number");

        if (number < 0) {
        document.querySelector('#target').innerHTML = "The square root of a negative number is not defined";}
        else {
            result = Math.sqrt(number)
            document.querySelector('#target').innerHTML = "The square root is "+ result;
        }
    } else {
        document.querySelector('#target').innerHTML = "The square root will be not calculated.";
    }



</script>

</body>
</html>
